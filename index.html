<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Akula's Gold Rates</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Akula's Gold"/>
  <meta name="theme-color" content="#050505"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --g1: #f5d981;
      --g2: #c9943a;
      --g3: #8a6020;
      --g4: #3a2a0a;
      --silver1: #e8edf5;
      --silver2: #9aa8c0;
      --silver3: #4a5570;
      --bg:  #050505;
      --bg2: #0d0d0d;
      --bg3: #141414;
      --bg4: #1c1c1c;
      --text: #f5ead8;
      --dim:  #6a6050;
      --up:   #5dba85;
      --dn:   #d95555;
      --radius: 20px;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body { height:100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ══════════════════════════════════════
       HERO BACKGROUND — animated gold shine
    ══════════════════════════════════════ */
    .hero-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    /* Deep dark base */
    .hero-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 60% at 50% -10%, #2a1f08 0%, transparent 60%),
        radial-gradient(ellipse 80% 40% at 80% 110%, #1a1208 0%, transparent 50%),
        radial-gradient(ellipse 60% 30% at 20% 80%, #0f0d06 0%, transparent 40%),
        #050505;
    }

    /* Gold shimmer rays */
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        conic-gradient(from 220deg at 50% 0%, transparent 0deg, rgba(197,156,40,0.06) 20deg, transparent 40deg),
        conic-gradient(from 60deg at 80% 100%, transparent 0deg, rgba(197,156,40,0.04) 30deg, transparent 60deg);
      animation: shimmer 8s ease-in-out infinite alternate;
    }
    @keyframes shimmer {
      from { opacity: 0.6; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    /* Floating gold particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(197,156,40,0.6), transparent);
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* Gold bar visual — decorative */
    .gold-bar-visual {
      position: fixed;
      top: -60px;
      right: -40px;
      width: 280px;
      height: 160px;
      background: linear-gradient(135deg,
        #8a6020 0%, #c9943a 20%, #f5d981 40%,
        #e8c060 55%, #c9943a 70%, #8a6020 85%, #5a3c10 100%);
      border-radius: 16px;
      transform: rotate(-15deg);
      opacity: 0.08;
      z-index: 0;
      box-shadow: inset 0 2px 8px rgba(255,220,80,0.3);
    }
    .gold-bar-visual::after {
      content: '';
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(245,217,129,0.3);
      border-radius: 8px;
    }

    /* Silver bar visual */
    .silver-bar-visual {
      position: fixed;
      bottom: -40px;
      left: -60px;
      width: 240px;
      height: 120px;
      background: linear-gradient(135deg,
        #4a5570 0%, #8a98b8 20%, #e8edf5 45%,
        #c0c8d8 60%, #8a98b8 75%, #4a5570 100%);
      border-radius: 12px;
      transform: rotate(12deg);
      opacity: 0.06;
      z-index: 0;
    }

    /* ══════════════════════════════════════
       MAIN LAYOUT
    ══════════════════════════════════════ */
    .app {
      position: relative;
      z-index: 1;
      max-width: 440px;
      margin: 0 auto;
      padding: 0 0 60px;
      padding-top: env(safe-area-inset-top);
    }

    /* ══════════════════════════════════════
       BRAND HEADER
    ══════════════════════════════════════ */
    .brand-header {
      padding: 48px 24px 0;
      text-align: center;
      position: relative;
    }

    /* Akula logo mark */
    .logo-mark {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      position: relative;
    }
    .logo-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1408, #2a2010);
      border: 1.5px solid;
      border-color: var(--g3) var(--g1) var(--g3) var(--g2);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow:
        0 0 20px rgba(197,156,40,0.15),
        inset 0 1px 0 rgba(245,217,129,0.1);
      animation: logo-glow 3s ease-in-out infinite alternate;
    }
    @keyframes logo-glow {
      from { box-shadow: 0 0 20px rgba(197,156,40,0.15), inset 0 1px 0 rgba(245,217,129,0.1); }
      to   { box-shadow: 0 0 35px rgba(197,156,40,0.30), inset 0 1px 0 rgba(245,217,129,0.2); }
    }
    .logo-letter {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 900;
      font-style: italic;
      background: linear-gradient(135deg, var(--g3), var(--g1), var(--g2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    /* Orbit ring */
    .logo-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid transparent;
      border-top-color: rgba(197,156,40,0.4);
      border-right-color: rgba(197,156,40,0.15);
      animation: orbit 6s linear infinite;
    }
    @keyframes orbit { to { transform: rotate(360deg); } }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--g3) 0%, var(--g1) 45%, var(--g2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .brand-sub {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 20px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 32px;
      margin-bottom: 8px;
    }
    .divider-line { flex:1; height:1px; background: linear-gradient(90deg, transparent, var(--g3), transparent); }
    .divider-diamond {
      width: 6px; height: 6px;
      background: var(--g2);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .city-time {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 1px;
      text-align: center;
      padding-bottom: 28px;
    }
    .city-time span { color: var(--g2); }

    /* Refresh */
    .refresh-btn {
      position: absolute;
      top: 48px;
      right: 20px;
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid #222;
      color: var(--g2);
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .refresh-btn:active { transform: scale(0.9); background: var(--bg4); }
    .refresh-btn.spinning { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════
       SECTION LABELS
    ══════════════════════════════════════ */
    .section { padding: 0 16px 14px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 4px;
      margin-bottom: 12px;
    }
    .section-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .section-icon.gold   { background: linear-gradient(135deg, #2a1f08, #3a2a10); border: 1px solid var(--g3); }
    .section-icon.silver { background: linear-gradient(135deg, #0e1018, #181e28); border: 1px solid var(--silver3); }
    .section-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--g2);
    }
    .section-title.silver-title { color: var(--silver2); }
    .section-line { flex:1; height:1px; background: linear-gradient(90deg, var(--g3), transparent); opacity:0.4; }
    .section-line.silver-line   { background: linear-gradient(90deg, var(--silver3), transparent); }

    /* ══════════════════════════════════════
       GOLD KARAT CARDS
    ══════════════════════════════════════ */
    .karat-card {
      background: var(--bg2);
      border-radius: var(--radius);
      border: 1px solid #1a1a1a;
      margin-bottom: 10px;
      overflow: hidden;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .karat-card:active { transform: scale(0.98); }

    /* Subtle gold shimmer on hover */
    .karat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(197,156,40,0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Left accent bar */
    .karat-card::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
    }
    .karat-card.k24::after { background: linear-gradient(180deg, var(--g1), var(--g2)); }
    .karat-card.k22::after { background: linear-gradient(180deg, var(--g2), var(--g3)); opacity: 0.8; }
    .karat-card.k18::after { background: linear-gradient(180deg, var(--g3), #5a3c10); opacity: 0.6; }

    .karat-inner {
      display: flex;
      align-items: center;
      padding: 18px 20px 14px 22px;
      gap: 14px;
    }

    /* Karat badge */
    .k-badge {
      flex-shrink: 0;
      text-align: center;
      width: 52px;
    }
    .k-num {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }
    .k24 .k-num { background: linear-gradient(135deg, var(--g2), var(--g1)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .k22 .k-num { background: linear-gradient(135deg, var(--g3), var(--g2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .k18 .k-num { background: linear-gradient(135deg, #5a3c10, var(--g3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .k-unit { font-size: 9px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; margin-top: 1px; }
    .k-desc { font-size: 9px; color: var(--dim); letter-spacing: 0.5px; margin-top: 2px; }

    /* Prices */
    .k-prices { flex:1; }
    .k-per-gram {
      display: flex;
      align-items: baseline;
      gap: 2px;
      margin-bottom: 8px;
    }
    .k-rupee { font-size: 15px; color: var(--g2); font-weight: 500; }
    .k-price-val {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.5px;
    }
    .k-per-label { font-size: 10px; color: var(--dim); margin-left: 2px; }

    /* 10g highlight box */
    .k-10g-box {
      background: linear-gradient(135deg, #1a1408, #221a0a);
      border: 1px solid var(--g4);
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .k-10g-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--g3);
      white-space: nowrap;
    }
    .k-10g-val {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--g1);
      letter-spacing: -0.3px;
    }
    .k-10g-rupee { font-size: 13px; color: var(--g2); }

    /* Change pill */
    .k-change { flex-shrink: 0; text-align: right; }
    .change-pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .change-pill.up   { background: rgba(93,186,133,0.12); color: var(--up); }
    .change-pill.down { background: rgba(217,85,85,0.12);  color: var(--dn); }
    .change-pill.flat { background: rgba(106,96,80,0.12);  color: var(--dim); }

    /* ══════════════════════════════════════
       SILVER CARD
    ══════════════════════════════════════ */
    .silver-card {
      background: linear-gradient(135deg, #0a0c12, #0e1018);
      border: 1px solid #181e28;
      border-radius: var(--radius);
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
    }
    .silver-card::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(154,168,192,0.08), transparent 70%);
    }
    .silver-card::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--silver1), var(--silver3));
    }
    .silver-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .silver-main {
      display: flex;
      align-items: baseline;
      gap: 2px;
    }
    .silver-rupee { font-size: 15px; color: var(--silver2); font-weight: 500; }
    .silver-price-val {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--silver1);
      line-height: 1;
    }
    .silver-per-label { font-size: 10px; color: var(--silver3); margin-left: 2px; }

    /* Silver 1kg box */
    .silver-kg-box {
      background: linear-gradient(135deg, #0e1220, #141828);
      border: 1px solid #202840;
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .silver-kg-label { font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--silver3); }
    .silver-kg-val {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--silver2);
    }
    .silver-kg-rupee { font-size: 13px; color: var(--silver3); }

    /* ══════════════════════════════════════
       FOOTER
    ══════════════════════════════════════ */
    .footer {
      margin: 8px 16px 0;
      background: var(--bg2);
      border: 1px solid #181818;
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--up);
      flex-shrink: 0;
      animation: live-pulse 2s ease-in-out infinite;
    }
    @keyframes live-pulse {
      0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(93,186,133,0.4); }
      50%      { opacity:0.7; box-shadow: 0 0 0 4px rgba(93,186,133,0); }
    }
    .footer p { font-size: 11px; color: var(--dim); line-height: 1.5; }
    .footer p strong { color: var(--text); font-weight: 500; }

    .footer-brand {
      margin: 12px 16px 0;
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      font-style: italic;
      color: var(--g3);
      letter-spacing: 1px;
      opacity: 0.6;
    }

    /* ══════════════════════════════════════
       LOADING SCREEN
    ══════════════════════════════════════ */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.6s ease;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    .loading-logo {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1408, #2a2010);
      border: 1.5px solid var(--g3);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(197,156,40,0.2);
      animation: loading-pulse 2s ease-in-out infinite alternate;
    }
    @keyframes loading-pulse {
      from { box-shadow: 0 0 20px rgba(197,156,40,0.15); }
      to   { box-shadow: 0 0 50px rgba(197,156,40,0.35); }
    }
    .loading-letter {
      font-family: 'Playfair Display', serif;
      font-size: 36px; font-weight: 900; font-style: italic;
      background: linear-gradient(135deg, var(--g3), var(--g1), var(--g2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .loading-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
      background: linear-gradient(135deg, var(--g3), var(--g1));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .loading-bar { width: 140px; height: 1px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
    .loading-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--g3), var(--g1), var(--g2));
      border-radius: 2px;
      animation: load-anim 1.8s ease-in-out infinite;
    }
    @keyframes load-anim {
      0%   { width:0%;   margin-left:0; }
      50%  { width:60%;  margin-left:20%; }
      100% { width:0%;   margin-left:100%; }
    }
    .loading-sub { font-size: 10px; color: var(--dim); letter-spacing: 3px; text-transform: uppercase; }

    /* Error */
    .error-box {
      margin: 12px 16px 0;
      background: rgba(217,85,85,0.08);
      border: 1px solid rgba(217,85,85,0.2);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px; color: #e08080;
      display: none; line-height: 1.6;
    }

    /* Fade in animation */
    .fadein { animation: fadein 0.5s ease forwards; }
    @keyframes fadein { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

  </style>
</head>
<body>

<!-- Decorative gold & silver bar backgrounds -->
<div class="hero-bg"></div>
<div class="gold-bar-visual"></div>
<div class="silver-bar-visual"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Loading screen -->
<div id="loading">
  <div class="loading-logo"><div class="loading-letter">A</div></div>
  <div class="loading-name">Akula's</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-sub">Fetching live rates&hellip;</div>
</div>

<!-- Main App -->
<div class="app">

  <!-- Brand Header -->
  <div class="brand-header">
    <button class="refresh-btn" id="refreshBtn" onclick="loadRates()" title="Refresh">↻</button>

    <div class="logo-mark">
      <div class="logo-circle">
        <div class="logo-letter">A</div>
        <div class="logo-ring"></div>
      </div>
    </div>

    <div class="brand-name">Akula's</div>
    <div class="brand-sub">Gold &amp; Silver Rates</div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <div class="city-time">
      Hyderabad &nbsp;·&nbsp; <span id="liveTime">--:--</span>
      &nbsp;·&nbsp; <span id="liveDate">--</span>
    </div>
  </div>

  <div id="errorBox" class="error-box"></div>

  <!-- Gold Section -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon gold">🥇</div>
      <div class="section-title">Gold Rates</div>
      <div class="section-line"></div>
    </div>

    <div id="goldCards">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- Silver Section -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon silver">🥈</div>
      <div class="section-title silver-title">Silver Rates</div>
      <div class="section-line silver-line"></div>
    </div>
    <div id="silverCard" class="silver-card">
      <div class="silver-top">
        <div class="silver-main">
          <span class="silver-rupee">₹</span>
          <span class="silver-price-val" id="silverGram">--</span>
          <span class="silver-per-label">/gram</span>
        </div>
        <div id="silverChangePill"></div>
      </div>
      <div class="silver-kg-box">
        <div class="silver-kg-label">Per Kilogram</div>
        <div>
          <span class="silver-kg-rupee">₹</span>
          <span class="silver-kg-val" id="silverKg">--</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="live-dot"></div>
    <p>Live prices in <strong>INR</strong> · Hyderabad market · Excl. GST &amp; making charges · Auto-refreshes every 10 min</p>
  </div>
  <div class="footer-brand">Akula's — Trusted Gold &amp; Silver Rates</div>

</div>

<script>
  // ═══════════════════════════════════════════════
  // API KEY — already configured, works on all devices
  const GOLDAPI_KEY     = "goldapi-nf7smmi7uwr0-io";
  const TROY_OZ_TO_GRAM = 31.1035;
  // ═══════════════════════════════════════════════

  const KARATS = [
    { id: "24", purity: 1.0000, name: "Pure Gold",       cls: "k24" },
    { id: "22", purity: 0.9167, name: "Jewellery Gold",  cls: "k22" },
    { id: "18", purity: 0.7500, name: "18K Mixed Gold",  cls: "k18" },
  ];

  function fmt(n)  { return Math.round(n).toLocaleString('en-IN'); }
  function fmtD(n) { return Number(n).toFixed(2); }

  function changePill(change) {
    if (change > 0)  return `<div class="change-pill up">▲ ₹${fmt(change)}</div>`;
    if (change < 0)  return `<div class="change-pill down">▼ ₹${fmt(Math.abs(change))}</div>`;
    return `<div class="change-pill flat">━ No change</div>`;
  }

  function renderGold(goldPerGram, goldPrevGram) {
    const container = document.getElementById('goldCards');
    container.innerHTML = '';
    KARATS.forEach((k, i) => {
      const rate    = goldPerGram  * k.purity;
      const prev    = goldPrevGram * k.purity;
      const change  = rate - prev;
      const per10g  = rate * 10;

      const card = document.createElement('div');
      card.className = `karat-card ${k.cls} fadein`;
      card.style.animationDelay = `${i * 0.08}s`;
      card.innerHTML = `
        <div class="karat-inner">
          <div class="k-badge">
            <div class="k-num">${k.id}</div>
            <div class="k-unit">Karat</div>
            <div class="k-desc">${k.purity === 1 ? '99.9%' : k.purity === 0.9167 ? '91.6%' : '75.0%'}</div>
          </div>
          <div class="k-prices">
            <div class="k-per-gram">
              <span class="k-rupee">₹</span>
              <span class="k-price-val">${fmt(rate)}</span>
              <span class="k-per-label">/gram</span>
            </div>
            <div class="k-10g-box">
              <div class="k-10g-label">Per 10 Grams</div>
              <div><span class="k-10g-rupee">₹</span><span class="k-10g-val">${fmt(per10g)}</span></div>
            </div>
          </div>
          <div class="k-change">${changePill(change)}</div>
        </div>`;
      container.appendChild(card);
    });
  }

  function renderSilver(silverPerGram, silverPrevGram) {
    const change = silverPerGram - silverPrevGram;
    document.getElementById('silverGram').textContent  = fmtD(silverPerGram);
    document.getElementById('silverKg').textContent    = fmt(silverPerGram * 1000);
    document.getElementById('silverChangePill').innerHTML = changePill(change);
    document.getElementById('silverCard').classList.add('fadein');
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('liveTime').textContent =
      now.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    document.getElementById('liveDate').textContent =
      now.toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  }

  async function loadRates() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    document.getElementById('errorBox').style.display = 'none';

    try {
      const headers = { 'x-access-token': GOLDAPI_KEY, 'Content-Type': 'application/json' };

      const [goldRes, silverRes] = await Promise.all([
        fetch('https://www.goldapi.io/api/XAU/INR', { headers }),
        fetch('https://www.goldapi.io/api/XAG/INR', { headers }),
      ]);

      if (!goldRes.ok)   throw new Error(`Gold: ${goldRes.status}`);
      if (!silverRes.ok) throw new Error(`Silver: ${silverRes.status}`);

      const gold   = await goldRes.json();
      const silver = await silverRes.json();

      const goldPerGram    = gold.price   / TROY_OZ_TO_GRAM;
      const goldPrevGram   = (gold.prev_close_price   || gold.price)   / TROY_OZ_TO_GRAM;
      const silverPerGram  = silver.price / TROY_OZ_TO_GRAM;
      const silverPrevGram = (silver.prev_close_price || silver.price) / TROY_OZ_TO_GRAM;

      renderGold(goldPerGram, goldPrevGram);
      renderSilver(silverPerGram, silverPrevGram);

    } catch (err) {
      console.error(err);
      const box = document.getElementById('errorBox');
      box.style.display = 'block';
      box.textContent   = '⚠️ Could not fetch live rates. Check your connection and tap ↻ to retry.';
    }

    btn.classList.remove('spinning');
    const loading = document.getElementById('loading');
    if (loading) {
      loading.classList.add('hide');
      setTimeout(() => loading.remove(), 700);
    }
  }

  // Floating gold particles
  function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 2;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random() * 100}%;
        animation-duration:${8 + Math.random() * 12}s;
        animation-delay:${Math.random() * -15}s;
        opacity:${0.2 + Math.random() * 0.4};
      `;
      container.appendChild(p);
    }
  }

  // Start
  createParticles();
  updateClock();
  setInterval(updateClock, 1000);
  loadRates();
  setInterval(loadRates, 10 * 60 * 1000);
</script>
</body>
</html>
